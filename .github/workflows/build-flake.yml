name: Build 🏗️ Flake Configuration

# This workflow validates the Nix configuration on every push/PR.
#
# Local validation (run BEFORE committing):
#   ./scripts/validate-config.sh
#
# If this workflow fails:
#   1. Pull latest changes: git pull
#   2. Run local validation: ./scripts/validate-config.sh
#   3. Check error messages for specific file/line references
#   4. Common issues: missing braces, import errors, option conflicts
#
# Emergency rollback:
#   sudo nixos-rebuild switch --rollback

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-nixos:
    name: Build NixOS Configuration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [floki, meh]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25  # v22

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d  # v14

      - name: Evaluate NixOS configuration for ${{ matrix.host }}
        run: |
          nix build --dry-run .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel

  build-home-manager:
    name: Build Home Manager Configuration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        user: ["gburd@floki", "gburd@meh"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25  # v22

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d  # v14

      - name: Evaluate home-manager configuration for ${{ matrix.user }}
        run: |
          nix build --dry-run .#homeConfigurations."${{ matrix.user }}".activationPackage
