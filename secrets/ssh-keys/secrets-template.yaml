# SSH Keys Secrets Template
#
# This template shows the expected structure for SSH keys in host secrets files.
# Actual files: nixos/workstation/{hostname}/secrets.yaml
#
# IMPORTANT: This file is NOT encrypted. It's just documentation.
# Real secrets files must be encrypted with sops before committing.
#
# To encrypt a new secrets file:
#   sops -e secrets.yaml > nixos/workstation/hostname/secrets.yaml
#
# To edit an encrypted secrets file:
#   sops nixos/workstation/hostname/secrets.yaml

# Standard structure for SSH keys in secrets.yaml:

# Authentication key (for SSH connections to remote systems)
ssh-keys:
  auth: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    [Your encrypted ed25519 private key content here]
    -----END OPENSSH PRIVATE KEY-----

  # Metadata for the auth key (helps with rotation tracking)
  auth-metadata:
    fingerprint: "SHA256:AbCdEf123456..."
    created: "2026-04-30T12:00:00Z"
    public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... user@host-YYYYMM"
    rotation_due: "2026-07-30"  # 90 days after creation (quarterly)
    deployed_to:
      - github
      - codeberg
      - burd.me

  # Signing key (for git commit/tag signing)
  signing: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    [Your encrypted ed25519 private key content here]
    -----END OPENSSH PRIVATE KEY-----

  # Metadata for the signing key
  signing-metadata:
    fingerprint: "SHA256:XyZ789AbCdEf..."
    created: "2026-04-30T12:00:00Z"
    public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... user@host-signing-YYYYMM"
    rotation_due: "2026-07-30"  # 90 days after creation (quarterly)
    deployed_to:
      - github
      - codeberg

# Example: During rotation (dual-key period)
# When rotating keys, BOTH old and new keys exist for 7 days:
#
# ssh-keys:
#   # OLD key (still active)
#   auth: |
#     -----BEGIN OPENSSH PRIVATE KEY-----
#     [old key content]
#     -----END OPENSSH PRIVATE KEY-----
#
#   auth-metadata:
#     fingerprint: "SHA256:OLD..."
#     created: "2026-01-30T12:00:00Z"
#     rotation_state: "being-replaced"
#     removal_date: "2026-05-07"
#
#   # NEW key (dual-key period)
#   auth-new: |
#     -----BEGIN OPENSSH PRIVATE KEY-----
#     [new key content]
#     -----END OPENSSH PRIVATE KEY-----
#
#   auth-new-metadata:
#     fingerprint: "SHA256:NEW..."
#     created: "2026-04-30T12:00:00Z"
#     rotation_state: "dual-key-period"
#     cutover_date: "2026-05-07"  # 7 days after generation

# After cutover (day 8+):
# The "-new" suffix is removed, new key becomes primary:
#
# ssh-keys:
#   auth: |
#     -----BEGIN OPENSSH PRIVATE KEY-----
#     [new key content - now primary]
#     -----END OPENSSH PRIVATE KEY-----
#
#   auth-metadata:
#     fingerprint: "SHA256:NEW..."
#     created: "2026-04-30T12:00:00Z"
#     cutover_date: "2026-05-07"
#     previous_fingerprint: "SHA256:OLD..."

# Host-specific considerations:
#
# meh (Linux desktop):
#   - Uses SSH signing (already configured)
#   - Primary workstation, highest rotation priority
#   - Has both auth and signing keys
#
# floki (Linux desktop):
#   - Currently uses GPG signing (needs conversion to SSH)
#   - Has both auth and signing keys
#
# arnold (Fedora, standalone home-manager):
#   - Currently uses GPG signing (needs conversion to SSH)
#   - May have limited sops access
#
# darwin (macOS):
#   - Currently uses GPG signing (needs conversion to SSH)
#   - May need macOS keychain integration
#   - Has both auth and signing keys

# Integration with home-manager:
#
# In your host configuration (e.g., hosts/meh.nix):
#
# sops = {
#   defaultSopsFile = "${inputs.self}/nixos/workstation/meh/secrets.yaml";
#   age.sshKeyPaths = [ "${config.home.homeDirectory}/.ssh/id_ed25519" ];
#   secrets = {
#     "ssh-keys/auth" = {
#       path = "${config.home.homeDirectory}/.ssh/id_auth_ed25519";
#     };
#     "ssh-keys/signing" = {
#       path = "${config.home.homeDirectory}/.ssh/id_signing_ed25519";
#     };
#   };
# };
#
# Or using the ssh-management module:
#
# services.ssh-management = {
#   enable = true;
#   authKey = {
#     secret = config.sops.secrets."ssh-keys/auth".path;
#     publicKey = "ssh-ed25519 AAAAC3Nza...";
#   };
#   signingKey = {
#     secret = config.sops.secrets."ssh-keys/signing".path;
#     publicKey = "ssh-ed25519 AAAAC3Nza...";
#   };
#   rotationInterval = "quarterly";
#   sync1Password = true;
# };

# Security notes:
# 1. Never commit this file with real keys - it's just a template
# 2. Always use sops to encrypt before committing
# 3. Keys are encrypted with age keys derived from SSH host keys
# 4. Multiple decryption keys (host + user) for redundancy
# 5. Rotation maintains dual-key period for safe cutover
# 6. All keys use ed25519 (modern, secure, fast)
# 7. Regular rotation (quarterly) reduces exposure window
