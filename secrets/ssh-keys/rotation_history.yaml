# SSH Key Rotation History
#
# This file maintains an audit log of all SSH key rotations across all hosts.
# Each entry documents when a key was rotated, which host, and relevant details.
#
# Format:
#   - date: ISO 8601 timestamp
#     hostname: Host where rotation occurred
#     key_type: auth, signing, or host
#     action: Action performed (see below)
#     fingerprint: New key fingerprint
#     old_fingerprint: Previous key fingerprint (if applicable)
#     emergency: Whether this was emergency rotation
#     notes: Optional additional context
#
# Actions:
#   - generated_new_key: New key generated (start of dual-key period)
#   - cutover_to_new_key: New key became primary
#   - removed_old_key: Old key removed after dual-key period
#   - emergency_rotation: Immediate rotation due to compromise
#   - revoked_key: Key revoked from git hosting services
#   - restored_from_backup: Key restored from 1Password or git
#
# Example entries:
#
# - date: "2026-04-30T12:34:56Z"
#   hostname: meh
#   key_type: auth
#   action: generated_new_key
#   fingerprint: "SHA256:ABC123..."
#   emergency: false
#   notes: "Quarterly rotation"
#
# - date: "2026-05-07T12:34:56Z"
#   hostname: meh
#   key_type: auth
#   action: cutover_to_new_key
#   old_fingerprint: "SHA256:OLD123..."
#   fingerprint: "SHA256:ABC123..."
#   emergency: false
#   notes: "Completed dual-key period, new key is now primary"
#
# - date: "2026-05-14T12:34:56Z"
#   hostname: meh
#   key_type: auth
#   action: removed_old_key
#   old_fingerprint: "SHA256:OLD123..."
#   emergency: false
#   notes: "Old key removed after successful verification"

# Rotation history begins below this line
# (Entries will be automatically appended by rotation scripts)
